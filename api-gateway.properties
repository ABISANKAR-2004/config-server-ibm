server.port=9090
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.discovery.locator.enabled=true

spring.cloud.gateway.server.webflux.routes[0].id=springboot-ms2
spring.cloud.gateway.server.webflux.routes[0].uri=lb://springboot-ms2
spring.cloud.gateway.server.webflux.routes[0].predicates[0].=Path=/api/emp/**

spring.cloud.gateway.server.webflux.routes[1].id=springboot-ms1
spring.cloud.gateway.server.webflux.routes[1].uri=lb://springboot-ms1
spring.cloud.gateway.server.webflux.routes[1].predicates[0].=Path=/api/dept/**
